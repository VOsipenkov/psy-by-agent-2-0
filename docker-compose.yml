services:
  postgres:
    image: postgres:16-alpine
    container_name: dream-postgres
    environment:
      POSTGRES_DB: dreams
      POSTGRES_USER: dream
      POSTGRES_PASSWORD: dream
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dream -d dreams"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: dream-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: dream-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dreams
      SPRING_DATASOURCE_USERNAME: dream
      SPRING_DATASOURCE_PASSWORD: dream
      APP_OLLAMA_BASE_URL: ${APP_OLLAMA_BASE_URL:-http://ollama:11434}
      APP_OLLAMA_MODEL: ${APP_OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: dream-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  ollama_data:



